<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #1f2328;
      background: #ffffff;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #d0d7de;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header .status {
      font-size: 12px;
      color: #656d76;
    }

    .header .status.matched {
      color: #1a7f37;
    }

    .convert-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 12px 16px;
      padding: 8px 16px;
      background: #238636;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .convert-btn:hover {
      background: #2ea043;
    }

    .section {
      padding: 12px 16px;
      border-top: 1px solid #d0d7de;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #656d76;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .add-rule {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .add-rule input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    .add-rule input:focus {
      border-color: #0969da;
    }

    .add-rule button {
      padding: 6px 12px;
      background: #0969da;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .add-rule button:hover {
      background: #0550ae;
    }

    .rule-list {
      list-style: none;
    }

    .rule-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #f6f8fa;
    }

    .rule-pattern {
      font-size: 13px;
      font-family: "SFMono-Regular", Consolas, monospace;
      word-break: break-all;
      flex: 1;
    }

    .rule-delete {
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }

    .rule-delete:hover {
      color: #cf222e;
      background: #ffebe9;
    }

    .empty-state {
      text-align: center;
      color: #8b949e;
      font-size: 13px;
      padding: 12px;
    }

    .help {
      font-size: 11px;
      color: #8b949e;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>网页 Markdown 查看器</h1>
    <div class="status" id="status">检查中...</div>
  </div>

  <button class="convert-btn" id="convertBtn">立即转换当前页面</button>

  <div class="section">
    <div class="section-title">URL 匹配规则</div>
    <div class="add-rule">
      <input type="text" id="ruleInput" placeholder="*://*.example.com/*" />
      <button id="addBtn">添加</button>
    </div>
    <ul class="rule-list" id="ruleList"></ul>
    <div class="help">
      使用 Chrome 匹配模式语法，如：*://*.zhihu.com/*
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
